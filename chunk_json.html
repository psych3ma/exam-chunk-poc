<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!--
  정적 목업 — 단일 원본: ui/static/chunk_json.html
  FastAPI: GET {API_BASE}/ui-mock/chunk_json.html (FileResponse, HEAD 지원)
  PoC 실행 결과: DOM `#chunk-poc-fixed-example-json` (동기화: chunk_poc_fixed_example.json)
  (선택) 연동: meta chunk-extract-api-base 또는 window.CHUNK_EXTRACT_API_BASE
-->
<meta name="chunk-extract-api-base" content="" />
<title>Chunk Module — Builder Mockup</title>
<style>
/* ─── Design tokens ────────────────────────────────────────────── */
:root {
  /* Surface */
  --bg-primary:   #ffffff;
  --bg-secondary: #f5f5f4;

  /* Text */
  --text-primary:   #1c1917;
  --text-secondary: #78716c;
  --text-tertiary:  #a8a29e;

  /* Border */
  --border-weak:   rgba(0,0,0,0.12);
  --border-medium: rgba(0,0,0,0.20);

  /* Radius */
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-pill: 999px;

  /* Typography */
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', monospace;

  /* ── Module palette (single source of truth per module) ── */
  --module-parse-color:    #6366f1;
  --module-parse-bg:       #ede9fe;
  --module-classify-color: #f97316;
  --module-chunk-color:    #16a34a;
  --module-chunk-bg:       #f0fdf4;
  --module-chunk-badge-bg: #f0fdf4;
  --module-chunk-badge-fg: #15803d;
  --module-chunk-badge-bd: #bbf7d0;
  --module-extract-color:  #ec4899;
  --module-extract-bg:     #fce7f3;
  --module-instruct-color: #06b6d4;
  --module-instruct-bg:    #e0f2fe;

  /* ── Semantic status dots ──────────────────────────────── */
  --dot-auto: #10b981;
  --dot-ai:   #6366f1;

  /* ── JSON syntax colours ───────────────────────────────── */
  --json-key: #6366f1;
  --json-num: #059669;
  --json-str: #d97706;

  /* ── Shared connector colour ───────────────────────────── */
  --connector-color: #c4b5fd;

  /* ── Canvas background ─────────────────────────────────── */
  --canvas-bg: #eef1f8;

  /* ── Spacing & type rhythm (패널·폼 공통 — 숫자 산재 방지) ── */
  --space-2xs: 4px;
  --space-xs: 6px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --leading-snug: 1.45;
  --leading-relaxed: 1.62;
  /* module-chunk #16a34a 기준 포커스 링 */
  --focus-ring-chunk: rgba(22, 163, 74, 0.28);

  /* 캔버스 노드 라벨 — 하이픈(Chunk-1) 등에서 불필요한 줄바꿈 방지 */
  --node-min-width: 116px;
  --node-label-line-height: 1.25;

  /* 페이지·빌더 셸 (목업 치수 단일 출처) */
  --page-bg: #f0f0f0;
  --page-padding: 24px;
  --builder-height: 620px;
  --builder-max-width: 960px;
  --panel-width: 328px;
  --panel-body-padding-y: 14px;
  --panel-body-inline-padding: var(--space-lg);
  --divider-bleed: var(--panel-body-inline-padding);
  /* 코드·JSON 미리보기 공통 상한 (dvh 지원 시 짧은 뷰포트에서 내부 스크롤 영역 축소 → 이중 스크롤 부담 완화) */
  --code-block-max-height-base: 148px;
  --code-block-max-height: var(--code-block-max-height-base);
  --result-body-max-height: var(--code-block-max-height);
  --json-preview-max-height: var(--code-block-max-height);
  /* 의도 입력: 리사이즈 상한을 뷰포트와 연동 */
  --instr-textarea-min-height: 5.75rem;
  --instr-textarea-max-height: 12rem;
  --leading-code: 1.7;

  /* 상태·피드백 */
  --text-danger: #b91c1c;
  --border-success: #6ee7b7;
  --state-run-loading-bg: var(--module-chunk-badge-fg);
  --state-run-success-bg: var(--json-num);

  /* Flow 카드 — 모듈 팔레트와 정렬 (raw=Parse, out=Extract) */
  --flow-out-border: #f9a8d4;
}

@supports (height: 1dvh) {
  :root {
    --code-block-max-height: min(var(--code-block-max-height-base), 40dvh);
    --instr-textarea-max-height: min(12rem, 36dvh);
  }
}

/* ─── Reset ─────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background: var(--page-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: var(--page-padding);
}

/* ─── Builder shell ──────────────────────────────────────────────── */
.builder {
  display: flex;
  height: var(--builder-height);
  width: 100%;
  max-width: var(--builder-max-width);
  border: 0.5px solid var(--border-weak);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}

/* ─── Canvas ────────────────────────────────────────────────────── */
.canvas {
  flex: 1;
  min-height: 0;
  background: var(--canvas-bg);
  position: relative;
  overflow: hidden;
}
.topbar {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--bg-primary);
  border: 0.5px solid var(--border-weak);
  border-radius: var(--radius-pill);
  padding: 6px 14px;
  z-index: 10;
  white-space: nowrap;
}
.tb-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  color: var(--text-secondary);
}
.tb-item.is-active { color: var(--text-primary); font-weight: 500; }
.tb-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
.tb-sep { color: var(--border-medium); font-size: 12px; }

.pipeline {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  align-items: center;
}
.node {
  position: relative;
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: var(--node-min-width);
  padding: 10px 14px;
  background: var(--bg-primary);
  border: 0.5px solid var(--border-weak);
  border-radius: var(--radius-lg);
  cursor: pointer;
}
.node.is-active { border: 1.5px solid var(--module-chunk-color); }
.node-icon {
  width: 28px;
  height: 28px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
/* 라벨 스택: flex 안에서 말줄임이 동작하려면 min-width:0 필요 */
.node-label-stack {
  min-width: 0;
  flex: 1;
  overflow: hidden;
}
.node-name {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-primary);
  line-height: var(--node-label-line-height);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.node-type {
  font-size: 10px;
  color: var(--text-tertiary);
  line-height: var(--node-label-line-height);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.node.is-active .node-type { color: var(--module-chunk-color); }

.connector { display: flex; align-items: center; }
.conn-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--connector-color); flex-shrink: 0; }
.conn-line { width: 28px; height: 1px; background: var(--connector-color); }

.port {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--connector-color);
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
}
.port-left  { left:  -3.5px; }
.port-right { right: -3.5px; }
.node.is-active .port { background: var(--module-chunk-color); }

.zoom-controls { position: absolute; bottom: 12px; left: 14px; display: flex; gap: 6px; }
.zoom-btn {
  width: 26px;
  height: 26px;
  background: var(--bg-primary);
  border: 0.5px solid var(--border-weak);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  line-height: 1;
  cursor: pointer;
  color: var(--text-secondary);
}

/* ─── Panel ──────────────────────────────────────────────────────── */
.panel {
  width: var(--panel-width);
  flex-shrink: 0;
  min-height: 0;
  background: var(--bg-primary);
  border-left: 0.5px solid var(--border-weak);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 16px 10px;
  border-bottom: 0.5px solid var(--border-weak);
}
.panel-title {
  display: flex;
  align-items: center;
  gap: 7px;
  min-width: 0;
  flex: 1;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-primary);
}
.panel-heading-name {
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.panel-icon {
  width: 22px;
  height: 22px;
  border-radius: var(--radius-sm);
  background: var(--module-chunk-bg);
  display: flex;
  align-items: center;
  justify-content: center;
}
.panel-actions { display: flex; gap: 10px; color: var(--text-tertiary); font-size: 13px; }
.panel-actions span { cursor: pointer; }

.panel-body {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
  padding: var(--panel-body-padding-y) var(--panel-body-inline-padding);
  display: flex;
  flex-direction: column;
  gap: var(--space-md);
  scrollbar-gutter: stable;
  scrollbar-width: thin;
  scrollbar-color: var(--border-medium) transparent;
}
.panel-body::-webkit-scrollbar { width: 3px; }
.panel-body::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 2px; }

.panel-footer {
  flex-shrink: 0;
  padding: 10px 16px;
  border-top: 0.5px solid var(--border-weak);
}

/* ─── Flow strip ─────────────────────────────────────────────────── */
.flow-strip { display: flex; align-items: center; }
.flow-card { flex: 1; border-radius: var(--radius-md); padding: 6px 8px; text-align: center; }
.flow-card.raw  { background: var(--module-parse-bg); border: 0.5px solid var(--connector-color); }
.flow-card.mold { background: var(--module-chunk-bg); border: 0.5px solid var(--module-chunk-badge-bd); }
.flow-card.out  { background: var(--module-extract-bg); border: 0.5px solid var(--flow-out-border); }
.flow-label { font-size: 9px; font-weight: 500; color: var(--text-tertiary); }
.flow-name  { font-size: 11px; font-weight: 500; color: var(--text-primary); }
.flow-arrow { font-size: 13px; color: var(--text-tertiary); padding: 0 3px; }

/* ─── Section scaffold ───────────────────────────────────────────── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--space-sm);
}
.section-label { font-size: 11px; font-weight: 500; color: var(--text-tertiary); }
.divider {
  height: 0.5px;
  background: var(--border-weak);
  margin: 0 calc(-1 * var(--divider-bleed));
}

/* ─── Toggle (segment control) ──────────────────────────────────── */
.toggle-group {
  display: flex;
  border: 0.5px solid var(--border-weak);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.tg-btn {
  padding: 3px 10px;
  font-size: 11px;
  font-family: var(--font-sans);
  cursor: pointer;
  color: var(--text-secondary);
  border: none;
  background: transparent;
  transition: background 0.12s, color 0.12s;
}
.tg-btn.is-on { background: var(--bg-secondary); color: var(--text-primary); font-weight: 500; }
.toggle-group--nested {
  margin-bottom: var(--space-sm);
  align-self: flex-start;
}
.toggle-group--nested .tg-btn { padding: 2px 8px; font-size: 10px; }

/* ─── Chips ──────────────────────────────────────────────────────── */
.chip {
  display: flex;
  align-items: flex-start;
  gap: var(--space-sm);
  padding: var(--space-md) var(--space-md);
  background: var(--bg-secondary);
  border: 0.5px solid var(--border-weak);
  border-radius: var(--radius-md);
  font-size: 11px;
  line-height: var(--leading-relaxed);
  color: var(--text-secondary);
}
.chip-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: calc((11px * var(--leading-relaxed) - 5px) / 2);
}
.chip--stacked { margin-top: var(--space-xs); }

/* ─── Upload zone ────────────────────────────────────────────────── */
.upload-zone {
  border: 1px dashed var(--border-medium);
  border-radius: var(--radius-md);
  padding: 11px;
  text-align: center;
  cursor: pointer;
  transition: background 0.12s;
}
.upload-zone:hover { background: var(--bg-secondary); }
.upload-zone:focus { outline: 2px solid var(--module-chunk-color); outline-offset: 2px; }
.upload-zone--active { background: var(--bg-secondary); }
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border: 0;
}
pre.json-pre {
  margin: 0;
  white-space: pre-wrap;
  word-break: break-word;
  font-family: var(--font-mono);
  font-size: 10.5px;
  line-height: var(--leading-code);
  color: var(--text-secondary);
}
/*
  패널 내 업로드 미리보기: 높이 상한 + 내부 스크롤.
  패널 스크롤은 .panel-body(min-height:0)에서만 축소되도록 보장 — 푸터·이중 스크롤 UX는 짧은 뷰포트에서 --code-block-max-height의 dvh가 완화.
*/
.json-box pre.json-pre {
  max-height: var(--json-preview-max-height);
  overflow-y: auto;
  overflow-x: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border-medium) transparent;
  padding-inline-end: var(--space-xs);
}
.json-box pre.json-pre::-webkit-scrollbar { width: 3px; height: 3px; }
.json-box pre.json-pre::-webkit-scrollbar-thumb {
  background: var(--border-medium);
  border-radius: 2px;
}
.upload-icon {
  width: 26px;
  height: 26px;
  border-radius: 7px;
  background: var(--module-chunk-bg);
  margin: 0 auto 5px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.upload-text { font-size: 11px; color: var(--text-secondary); }
.upload-text strong { color: var(--text-primary); font-weight: 500; display: block; margin-bottom: 1px; }
.upload-text__sub { display: block; }
.upload-error { color: var(--text-danger); margin-top: var(--space-xs); }

/* ─── JSON box ───────────────────────────────────────────────────── */
.json-box {
  position: relative;
  background: var(--bg-secondary);
  border: 0.5px solid var(--border-weak);
  border-radius: var(--radius-md);
  padding: 8px 10px;
  padding-top: 28px;
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--text-secondary);
  line-height: var(--leading-code);
  min-height: 0;
}
.del-btn {
  position: absolute;
  top: 6px;
  right: 8px;
  font-size: 10px;
  font-family: var(--font-sans);
  color: var(--text-tertiary);
  cursor: pointer;
  background: var(--bg-primary);
  border: 0.5px solid var(--border-weak);
  border-radius: 4px;
  padding: 1px 5px;
}
.jk { color: var(--json-key); }
.jv { color: var(--json-num); }
.js { color: var(--json-str); }

/* ─── 사용자 의도 블록 (라벨 + textarea 세로 리듬) ─────────────────── */
.chunk-intent-block {
  display: flex;
  flex-direction: column;
  gap: var(--space-sm);
  margin-bottom: var(--space-md);
}
.instr-label {
  font-size: 10px;
  color: var(--text-tertiary);
  line-height: var(--leading-snug);
  margin: 0;
}
.instr-textarea {
  width: 100%;
  box-sizing: border-box;
  border: 0.5px solid var(--border-weak);
  border-radius: var(--radius-md);
  padding: var(--space-md) var(--space-md);
  font-size: 11px;
  line-height: var(--leading-relaxed);
  font-family: var(--font-sans);
  color: var(--text-primary);
  background: var(--bg-secondary);
  resize: vertical;
  min-height: var(--instr-textarea-min-height);
  max-height: var(--instr-textarea-max-height);
}
.instr-textarea::placeholder {
  color: var(--text-tertiary);
  line-height: var(--leading-relaxed);
}
.instr-textarea:focus {
  outline: 2px solid var(--focus-ring-chunk);
  outline-offset: 1px;
}

/* ─── Result area ────────────────────────────────────────────────── */
.result-wrap { border: 0.5px solid var(--border-weak); border-radius: var(--radius-md); overflow: hidden; }
.result-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--space-sm);
  padding: 7px 10px;
  background: var(--bg-secondary);
  border-bottom: 0.5px solid var(--border-weak);
}
.result-head-text {
  display: flex;
  align-items: center;
  min-width: 0;
}
.result-label { font-size: 11px; font-weight: 500; color: var(--text-secondary); }
/**
 * 변환 결과 설명( PoC 안내·데모 힌트 등 ) — `result-wrap` 바깥 상단에 두어 헤더와 JSON 사이 가독성 확보
 * 문구는 CHUNK_UI_COPY.resultSubtitleForRunKind 단일 출처
 */
.result-context {
  margin: 0 0 8px;
  padding: 0;
  font-size: 10.5px;
  font-weight: 400;
  color: var(--text-secondary);
  line-height: 1.45;
}
.result-actions { display: flex; gap: 4px; flex-shrink: 0; padding-top: 1px; }
.icon-btn {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  font-size: 10px;
  font-family: var(--font-sans);
  color: var(--text-secondary);
  border: 0.5px solid var(--border-weak);
  border-radius: 5px;
  cursor: pointer;
  background: var(--bg-primary);
  transition: color 0.1s;
}
.icon-btn:hover { color: var(--text-primary); }
.icon-btn.is-copied { color: var(--json-num); border-color: var(--border-success); }
.result-body {
  max-height: var(--result-body-max-height);
  overflow-y: auto;
  overflow-x: auto;
  padding: 8px 10px;
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--text-secondary);
  line-height: var(--leading-code);
  scrollbar-width: thin;
  scrollbar-color: var(--border-medium) transparent;
}
.result-body::-webkit-scrollbar { width: 3px; }
.result-body::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 2px; }
.result-footer-bar {
  font-size: 10px;
  color: var(--text-tertiary);
  padding: 4px 10px;
  background: var(--bg-secondary);
  border-top: 0.5px solid var(--border-weak);
}

/* ─── Badge ──────────────────────────────────────────────────────── */
.badge {
  font-size: 10px;
  border-radius: 4px;
  padding: 1px 6px;
  border: 0.5px solid var(--module-chunk-badge-bd);
  background: var(--module-chunk-badge-bg);
  color: var(--module-chunk-badge-fg);
}

/* ─── Run button ─────────────────────────────────────────────────── */
.run-btn {
  width: 100%;
  padding: 9px;
  background: var(--module-chunk-color);
  color: #fff;
  border: none;
  border-radius: var(--radius-md);
  font-size: 12px;
  font-weight: 500;
  font-family: var(--font-sans);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: filter 0.12s;
}
.run-btn:hover { filter: brightness(0.92); }
</style>
</head>
<body>

<div class="builder">

  <!-- ── Canvas ────────────────────────────────────────────────── -->
  <div class="canvas">

    <div class="topbar">
      <div class="tb-item">
        <span class="tb-dot" style="background:var(--module-parse-color);"></span>Parse
      </div>
      <span class="tb-sep">+</span>
      <div class="tb-item">
        <span class="tb-dot" style="background:var(--module-classify-color);"></span>Classify
      </div>
      <span class="tb-sep">+</span>
      <div class="tb-item is-active">
        <span class="tb-dot" style="background:var(--module-chunk-color);"></span>
        Chunk <span class="badge" style="margin-left:2px;">신규</span>
      </div>
      <span class="tb-sep">+</span>
      <div class="tb-item">
        <span class="tb-dot" style="background:var(--module-extract-color);"></span>Extract
      </div>

/** Chunk 패널 런타임 — PoC 예시 JSON의 `json_schema.name` 과 맞출 모듈명 */
const CHUNK_CONFIG = Object.freeze({
  extractModuleName: 'Extract-1',
});

/**
 * PoC 고정 예시 JSON — `#chunk-poc-fixed-example-json` 단일 DOM 소스.
 * 리포지터리의 `chunk_poc_fixed_example.json` 과 동기화하면 diff·리뷰가 쉬움.
 */
let CHUNK_POC_FIXED_EXAMPLE_CACHE_STR = null;

function stringifyChunkPocFixedExampleFromDom() {
  const el = document.getElementById('chunk-poc-fixed-example-json');
  if (!el || !String(el.textContent || '').trim()) {
    throw new Error('#chunk-poc-fixed-example-json 요소가 없거나 비어 있습니다.');
  }
  const obj = JSON.parse(String(el.textContent).trim());
  if (obj && obj.json_schema && typeof obj.json_schema === 'object') {
    obj.json_schema.name = CHUNK_CONFIG.extractModuleName;
  }
  return JSON.stringify(obj, null, 2);
}

function getChunkPocFixedExamplePrettyString() {
  if (CHUNK_POC_FIXED_EXAMPLE_CACHE_STR == null) {
    CHUNK_POC_FIXED_EXAMPLE_CACHE_STR = stringifyChunkPocFixedExampleFromDom();
  }
  return CHUNK_POC_FIXED_EXAMPLE_CACHE_STR;
}

/* ── 파이프라인 상태 (Python chunk-llm.py 아티팩트와 동일 역할) ─────── */
window.CHUNK_PIPELINE = window.CHUNK_PIPELINE || {
  rawParsed: null,
  moldParsed: null,
  lastOutputStr: null,
  /** CHUNK_MOLD_AUTO_MODE 값 */
  moldAutoMode: CHUNK_MOLD_AUTO_MODE.STORED_SCHEMA,
  /** CHUNK_RESULT_RUN_KIND */
  lastRunKind: null,
};

/* initChunkPanelCopy는 CHUNK_PIPELINE 할당 이후에만 호출 (moldAutoMode 동기화 시 객체 필요) */
initChunkPanelCopy();

function getChunkResultStr() {
  const p = window.CHUNK_PIPELINE;
  return (p && p.lastOutputStr) || getChunkPocFixedExamplePrettyString();

/** Python ``is_designed_schema_dict`` 와 동형 */
function isDesignedSchemaShape(o) {
  return (
    o &&
    typeof o === 'object' &&
    Array.isArray(o.flat_keys) &&
    Array.isArray(o.tables)
  );
}

/** OUTPUT_FINAL 래퍼 — ``designedSchemaToOutputFinal`` 역방향 입력 허용 */
function isOutputFinalJsonSchemaShape(o) {
  return (
    o &&
    typeof o === 'object' &&
    o.type === 'json_schema' &&
    o.json_schema &&
    typeof o.json_schema === 'object' &&
    o.json_schema.schema &&
    o.json_schema.schema.type === 'object' &&
    o.json_schema.schema.properties &&
    typeof o.json_schema.schema.properties === 'object'
  );
}

/** ``designedSchemaToOutputFinal`` 의 역 — Python ``output_final_to_designed`` 와 동일 규칙 */
function outputFinalToDesignedSchema(o) {
  if (!isOutputFinalJsonSchemaShape(o)) return null;
  const props = o.json_schema.schema.properties;
  const flat_keys = [];
  const tables = [];
  for (const [name, defn] of Object.entries(props)) {
    if (!defn || typeof defn !== 'object') continue;
    if (
      defn.type === 'array' &&
      defn.items &&
      typeof defn.items === 'object' &&
      defn.items.type === 'object' &&
      defn.items.properties &&
      typeof defn.items.properties === 'object'
    ) {
      const columns = [];
      for (const [cn, cdef] of Object.entries(defn.items.properties)) {
        if (!cdef || typeof cdef !== 'object') continue;
        columns.push({
          name: cn,
          type: typeof cdef.type === 'string' ? cdef.type : 'string',
          description: cdef.description != null ? String(cdef.description) : '',
        });
      }
      tables.push({
        name,
        description: defn.description != null ? String(defn.description) : '',
        columns,
      });
    } else {
      flat_keys.push({
        name,
        type: typeof defn.type === 'string' ? defn.type : 'string',
        description: defn.description != null ? String(defn.description) : '',
      });
    }
  }
  return { flat_keys, tables };
}

/** 직접 업로드 JSON → 파이프라인·미리보기 공통 설계 틀 */
function resolveMoldUploadAsDesigned(o) {
  if (isDesignedSchemaShape(o)) return o;
  const conv = outputFinalToDesignedSchema(o);
  return conv && isDesignedSchemaShape(conv) ? conv : null;
}

function getMoldAutoMode() {
  const pipe = window.CHUNK_PIPELINE;
  if (pipe && pipe.moldAutoMode) return pipe.moldAutoMode;
  const on = document.querySelector('#tg-mold-auto-mode .tg-btn.is-on');
  const m = on && on.dataset.chunkMoldAuto;
  return m || CHUNK_MOLD_AUTO_MODE.STORED_SCHEMA;
}

function syncMoldAutoModeAria() {
  const tg = document.getElementById('tg-mold-auto-mode');
  if (!tg) return;
  tg.querySelectorAll('.tg-btn[data-chunk-mold-auto]').forEach(b => {
    b.setAttribute('aria-checked', b.classList.contains('is-on') ? 'true' : 'false');
  });
}

function handleMoldAutoModeToggle(btn) {
  const mode = btn.dataset.chunkMoldAuto;
  if (!mode) return;
  const tg = document.getElementById('tg-mold-auto-mode');
  if (tg) {
    tg.querySelectorAll('.tg-btn').forEach(b => b.classList.toggle('is-on', b === btn));
  }
  syncMoldAutoModeAria();
  window.CHUNK_PIPELINE.moldAutoMode = mode;
  refreshMoldAutoChipCopy();
}

function refreshMoldAutoChipCopy() {
  const el = document.getElementById('mold-auto-chip-copy');
  if (!el) return;
  const mode = getMoldAutoMode();
  el.textContent =
    mode === CHUNK_MOLD_AUTO_MODE.LLM_DESIGN
      ? CHUNK_UI_COPY.moldAutoChipLlm
      : CHUNK_UI_COPY.moldAutoChipStored;
}

/** Python ``ExtractSchema.total_key_count`` 와 동일 규칙 (데모 표시용) */
function countExtractKeyBudget(design) {
  let n = (design.flat_keys || []).length;
  for (const tb of design.tables || []) {
    n += 1 + (tb.columns || []).length;
  }
  return n;
}

const ICON = {
  play:  '<svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M5 3l9 5-9 5V3z" fill="currentColor"/></svg>',
  check: '<svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M3 8l3.5 3.5L13 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  copy:  '<svg width="11" height="11" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M3 11V3a1 1 0 011-1h8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>',
};

/* ── Generic toggle handler
     Works for any group with the pattern:
       - toggle group id:  #tg-{group}
       - auto pane id:     #{group}-auto
       - user pane id:     #{group}-user
─────────────────────────────────────────────────────────────────────── */
function handleToggle(btn) {
  const { group, mode } = btn.dataset;
  if (!group || !mode) return;

  const tg = document.getElementById('tg-' + group);
  const autoEl = document.getElementById(group + '-auto');
  const userEl = document.getElementById(group + '-user');
  if (!tg || !autoEl || !userEl) return;

  tg.querySelectorAll('.tg-btn').forEach(b => b.classList.toggle('is-on', b === btn));
  autoEl.style.display = mode === 'auto' ? 'block' : 'none';
  userEl.style.display = mode === 'user' ? 'block' : 'none';
  if (group === 'mold' && mode === 'auto') refreshMoldAutoChipCopy();
}

/* ── JSON 업로드 (raw / mold 공통 패턴)
     - 숨은 file input + FileReader (서버 URL 하드코딩 없음)
     - 표시는 textContent 로 XSS 방지
     Naming: #{group}-upload-zone, #{group}-file-input, #{group}-json-display
─────────────────────────────────────────────────────────────────────── */
const UPLOAD_GROUPS = ['raw', 'mold'];

function fileInputEl(group) {
  return document.getElementById(group + '-file-input');
}

function showUploadError(group, msg) {
  const el = document.getElementById(group + '-upload-error');
  if (!el) return;
  if (!msg) {
    el.style.display = 'none';
    el.textContent = '';
    return;
  }
  el.textContent = msg;
  el.style.display = 'block';
}

function isLikelyJsonFile(file) {
  const n = file.name.toLowerCase();
  return n.endsWith('.json') || file.type === 'application/json' || file.type === 'text/json' || file.type === '';
}

function countSchemaKeys(parsed) {
  if (Array.isArray(parsed)) {
    if (parsed.length === 0) return 0;
    const first = parsed[0];
    if (first && typeof first === 'object' && !Array.isArray(first)) return Object.keys(first).length;
    return 0;
  }
  if (parsed && typeof parsed === 'object') return Object.keys(parsed).length;
  return 0;
}

function moldUploadChipText(parsed) {
  const designed = resolveMoldUploadAsDesigned(parsed);
  if (designed) {
    const n = countExtractKeyBudget(designed);
    return isDesignedSchemaShape(parsed)
      ? CHUNK_UI_COPY.moldSchemaChipKeys(n)
      : CHUNK_UI_COPY.moldSchemaChipFromOutputFinal(n);
  }
  const n = countSchemaKeys(parsed);
  return n ? CHUNK_UI_COPY.moldSchemaChipGeneric(n) : CHUNK_UI_COPY.moldSchemaChipAmbiguous;
}

function applyUploadedJson(group, parsed, pretty, fileMeta) {
  showUploadError(group, '');
  document.getElementById(group + '-upload-zone').style.display = 'none';
  document.getElementById(group + '-uploaded').style.display = 'block';
  document.getElementById(group + '-json-display').textContent = pretty;

  if (group === 'raw') window.CHUNK_PIPELINE.rawParsed = parsed;
  if (group === 'mold') window.CHUNK_PIPELINE.moldParsed = parsed;

  const meta = document.getElementById(group + '-file-meta');
  if (meta) {
    meta.textContent =
      fileMeta ? CHUNK_UI_COPY.formatFileMeta(fileMeta.name, fileMeta.size) : '';
  }

  if (group === 'mold') {
    const chip = document.getElementById('mold-schema-chip');
    const chipText = document.getElementById('mold-schema-chip-text');
    chip.style.display = 'flex';
    chipText.textContent = moldUploadChipText(parsed);
  }
}

function clearUploaded(group) {
  const input = fileInputEl(group);
  if (input) input.value = '';
  showUploadError(group, '');
  document.getElementById(group + '-uploaded').style.display = 'none';
  document.getElementById(group + '-upload-zone').style.display = 'block';
  const pre = document.getElementById(group + '-json-display');
  if (pre) pre.textContent = '';
  const meta = document.getElementById(group + '-file-meta');
  if (meta) meta.textContent = '';
  if (group === 'raw') window.CHUNK_PIPELINE.rawParsed = null;
  if (group === 'mold') window.CHUNK_PIPELINE.moldParsed = null;

  if (group === 'mold') {
    const chip = document.getElementById('mold-schema-chip');
    chip.style.display = 'none';
    document.getElementById('mold-schema-chip-text').textContent = '';
  }
}

function onJsonFilePicked(group, fileList) {
  const file = fileList && fileList[0];
  if (!file) return;
  if (!isLikelyJsonFile(file)) {
    showUploadError(group, CHUNK_UI_COPY.errJsonNotJson);
    return;
  }
  const input = fileInputEl(group);
  const reader = new FileReader();
  reader.onload = () => {
    let parsed;
    try {
      parsed = JSON.parse(String(reader.result));
    } catch (e) {
      showUploadError(group, CHUNK_UI_COPY.errJsonParsePrefix + e.message);
      return;
    }
    applyUploadedJson(group, parsed, JSON.stringify(parsed, null, 2), file);
    if (input) input.value = '';
  };
  reader.onerror = () => showUploadError(group, CHUNK_UI_COPY.errFileRead);
  reader.readAsText(file, 'UTF-8');
}

function openJsonPicker(group) {
  showUploadError(group, '');
  const input = fileInputEl(group);
  if (input) input.click();
}

function bindDropZone(group) {
  const zone = document.getElementById(group + '-upload-zone');
  if (!zone) return;
  ['dragenter', 'dragover'].forEach(ev =>
    zone.addEventListener(ev, e => {
      e.preventDefault();
      e.stopPropagation();
      zone.classList.add('upload-zone--active');
    })
  );
  ['dragleave', 'drop'].forEach(ev =>
    zone.addEventListener(ev, e => {
      e.preventDefault();
      e.stopPropagation();
      zone.classList.remove('upload-zone--active');
    })
  );
  zone.addEventListener('drop', e => {
    const files = e.dataTransfer && e.dataTransfer.files;
    if (files && files.length) onJsonFilePicked(group, files);
  });
}

function initJsonUploads() {
  UPLOAD_GROUPS.forEach(group => {
    const zone = document.getElementById(group + '-upload-zone');
    const input = fileInputEl(group);
    if (!zone || !input) return;
    zone.addEventListener('click', () => openJsonPicker(group));
    zone.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        openJsonPicker(group);
      }
    });
    input.addEventListener('change', () => onJsonFilePicked(group, input.files));
    bindDropZone(group);
  });
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initJsonUploads);
} else {
  initJsonUploads();
}

/* ── JSON syntax highlighter (innerHTML 전 &<> 이스케이프) ─────────── */
function escapeHtmlForJsonView(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function highlightJson(str) {
  const safe = escapeHtmlForJsonView(str);
  return safe
    .replace(/("[\w가-힣]+")\s*:/g, '<span class="jk">$1</span>:')
    .replace(/: (\d+)/g, ': <span class="jv">$1</span>')
    .replace(/: ("[\w가-힣]+")/g, ': <span class="js">$1</span>');
}

/* ── Run button (PoC: 입력 조합과 무관하게 고정 예시 JSON만 표시) ─────── */
function runChunk() {
  void runChunkAsync();
}

async function runChunkAsync() {
  const btn = document.getElementById('run-btn');
  if (!btn) return;

  const pipe = window.CHUNK_PIPELINE;

  const rootStyle = getComputedStyle(document.documentElement);
  const loadingBg = rootStyle.getPropertyValue('--state-run-loading-bg').trim() || '#15803d';
  const successBg = rootStyle.getPropertyValue('--state-run-success-bg').trim() || '#059669';

  btn.disabled = true;
  btn.style.background = loadingBg;
  btn.innerHTML = `
    <svg width="11" height="11" viewBox="0 0 16 16" fill="none">
      <circle cx="8" cy="8" r="5" stroke="white" stroke-width="1.5" stroke-dasharray="16 8">
        <animateTransform attributeName="transform" type="rotate"
          from="0 8 8" to="360 8 8" dur="0.7s" repeatCount="indefinite"/>
      </circle>
    </svg><span class="run-btn__label">${CHUNK_UI_COPY.runLoading}</span>`;

  await new Promise((r) => setTimeout(r, CHUNK_UI_TIMING.runMockDelayMs));

  const resultBody = document.getElementById('result-body');
  const resultFooter = document.getElementById('result-footer-bar');
  const resultSection = document.getElementById('result-section');
  const resultSubEl = document.getElementById('chunk-result-subtitle');

  const runKind = CHUNK_RESULT_RUN_KIND.POC_FIXED_JSON_SCHEMA;
  let outStr;
  let footerText;

  try {
    outStr = getChunkPocFixedExamplePrettyString();
    footerText = CHUNK_UI_COPY.resultFooterPocFixed(new Blob([outStr]).size);
  } catch (e) {
    console.warn('[chunk_json] PoC 고정 예시 JSON:', e);
    outStr = JSON.stringify({ error: String(e.message || e) }, null, 2);
    footerText = CHUNK_UI_COPY.resultFooterPocFixed(new Blob([outStr]).size);
  }

  pipe.lastRunKind = runKind;
  pipe.lastOutputStr = outStr;

  if (resultBody) resultBody.innerHTML = highlightJson(outStr);
  if (resultFooter) resultFooter.textContent = footerText;
  if (resultSubEl) {
    const sub = CHUNK_UI_COPY.resultSubtitleForRunKind(runKind);
    resultSubEl.textContent = sub;
    resultSubEl.hidden = !sub;
  }
  if (resultSection) resultSection.style.display = 'block';

  btn.style.background = successBg;
  btn.innerHTML = `${ICON.check}<span class="run-btn__label">${CHUNK_UI_COPY.runSuccess}</span>`;
  btn.disabled = false;

  const body = document.getElementById('panel-body');
  if (body) {
    setTimeout(
      () => body.scrollTo({ top: body.scrollHeight, behavior: 'smooth' }),
      CHUNK_UI_TIMING.scrollAfterResultMs
    );
  }

  setTimeout(() => {
    btn.style.background = '';
    btn.innerHTML = `${ICON.play}<span class="run-btn__label">${CHUNK_UI_COPY.runAgain}</span>`;
  }, CHUNK_UI_TIMING.runSuccessResetMs);
}

/* ── Copy button ───────────────────────────────────────────────────── */
function copyResult() {
  navigator.clipboard.writeText(getChunkResultStr()).catch(() => {});
  const btn = document.getElementById('copy-btn');
  if (!btn) return;
  btn.classList.add('is-copied');
  btn.innerHTML = `${ICON.check}<span class="icon-btn-label">${CHUNK_UI_COPY.copyDone}</span>`;
  setTimeout(() => {
    btn.classList.remove('is-copied');
    btn.innerHTML = `${ICON.copy}<span class="icon-btn-label">${CHUNK_UI_COPY.copyLabel}</span>`;
  }, CHUNK_UI_TIMING.copyFeedbackMs);
}

/* ── Download button ───────────────────────────────────────────────── */
function downloadResult() {
  const a = document.createElement('a');
  const body = getChunkResultStr();
  const pipe = window.CHUNK_PIPELINE;
  const name = CHUNK_UI_COPY.downloadFilenameForRunKind(pipe && pipe.lastRunKind);
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(body);
  a.download = name;
  a.click();
}
